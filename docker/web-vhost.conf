# Local-docker Apache vhost. Mirrors the production proxy rules but drops
# SSL, the airspace.canadarasp.com host, and the surface-winds /data proxy
# (those live in a separate repo).
#
# DocumentRoot points directly at the bind-mounted source — no in-source
# symlinks (those would leak onto the host filesystem as broken links).
# /map-pngs, /windgrams-data, /windgram-tiles map into the shared /mnt
# volume via Alias rather than via the production symlink layout.

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /home/ubuntu/canadarasp/web-server
    DirectoryIndex RASPtable.html index.htm index.html

    # Production has `Redirect /index.html /RASP.html?v=16` and `RASP.html`
    # is a symlink to RASPtable.html in the source tree. We collapse both
    # into a single redirect so the source stays untouched.
    RedirectMatch ^/(index\.html|RASP\.html)$ /RASPtable.html

    <Directory "/home/ubuntu/canadarasp/web-server">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /map-pngs       /mnt/map-pngs
    Alias /windgrams-data /mnt/windgrams-data
    Alias /windgram-tiles /mnt/windgram-tiles

    <Directory "/mnt">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Cache-busting headers on the dirs the pipeline rewrites every cycle.
    <Directory "/home/ubuntu/canadarasp/web-server/windgrams/">
        Header set Cache-Control "max-age=0, no-cache, no-store, must-revalidate"
    </Directory>
    <Directory "/mnt/windgrams-data">
        Header set Cache-Control "max-age=0, no-cache, no-store, must-revalidate"
    </Directory>

    ProxyPass        /windgram  http://127.0.0.1:8090/windgram
    ProxyPassReverse /windgram  http://127.0.0.1:8090/windgram
    ProxyPass        /timezone2 http://127.0.0.1:8082/timezone2
    ProxyPassReverse /timezone2 http://127.0.0.1:8082/timezone2

    # Rewrites applied to HTML responses so the local stack is fully
    # self-contained — no requests escape to production:
    #   1. Swap the canadarasp.com-restricted Google Maps API key for the
    #      one in $GMAPS_API_KEY (templated by entrypoints/web.sh).
    #   2. Rewrite hardcoded https://canadarasp.com/... links + script
    #      sources (in aboutcanadarasp.html and windgrams/index.htm) to
    #      relative paths so they hit this server instead of production.
    #   3. Then strip any bare `https://canadarasp.com` host left over
    #      (e.g. the BASE_URL = ... : 'https://canadarasp.com' fallback
    #      in windgrams/index.htm), turning it into '' so JS URL
    #      concatenations stay relative.
    <Location />
        AddOutputFilterByType SUBSTITUTE text/html
        Substitute "s|AIzaSyDkSvQdD6DtFPPSHmITPmacGqirGtNSqoc|__GMAPS_API_KEY__|n"
        Substitute "s|https://www.canadarasp.com/|/|n"
        Substitute "s|https://canadarasp.com/|/|n"
        Substitute "s|http://www.canadarasp.com/|/|n"
        Substitute "s|http://canadarasp.com/|/|n"
        Substitute "s|https://www.canadarasp.com||n"
        Substitute "s|https://canadarasp.com||n"
        Substitute "s|http://www.canadarasp.com||n"
        Substitute "s|http://canadarasp.com||n"
    </Location>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
